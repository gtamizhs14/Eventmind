global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "eventmind-api"
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          service: api

  - job_name: "eventmind-worker"
    static_configs:
      - targets: ["host.docker.internal:9092"]
        labels:
          service: worker

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
