# Template — do NOT commit real values here.
# Create the secret with:
#   kubectl create secret generic eventmind-secrets \
#     --from-literal=LLM_PROVIDER=claude \
#     --from-literal=LLM_API_KEY=<key> \
#     ... -n eventmind
#
# Or from a .env file:
#   kubectl create secret generic eventmind-secrets --from-env-file=.env -n eventmind
apiVersion: v1
kind: Secret
metadata:
  name: eventmind-secrets
  namespace: eventmind
type: Opaque
stringData:
  LLM_PROVIDER: "claude"
  LLM_API_KEY: "<your-api-key>"
  KAFKA_BROKERS: "<confluent-bootstrap-server>:9092"
  KAFKA_SASL_USERNAME: "<confluent-api-key>"
  KAFKA_SASL_PASSWORD: "<confluent-api-secret>"
  DATABASE_URL: "<supabase-connection-string>"
  DATABASE_MAX_CONNS: "10"
  MONGODB_URI: "<mongodb-atlas-or-connection-string>"
  REDIS_URL: "<upstash-redis-url>"
