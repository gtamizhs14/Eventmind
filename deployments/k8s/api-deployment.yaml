apiVersion: v1
kind: Namespace
metadata:
  name: eventmind
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eventmind-api
  namespace: eventmind
  labels:
    app: eventmind-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eventmind-api
  template:
    metadata:
      labels:
        app: eventmind-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: <ECR_API_URL>
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9091
              name: metrics
          envFrom:
            - configMapRef:
                name: eventmind-config
            - secretRef:
                name: eventmind-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eventmind-api
  namespace: eventmind
spec:
  selector:
    app: eventmind-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: metrics
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eventmind-api-hpa
  namespace: eventmind
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eventmind-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
