apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eventmind-ingress
  namespace: eventmind
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  rules:
    - host: api.eventmind.example.com  # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eventmind-api
                port:
                  number: 80
