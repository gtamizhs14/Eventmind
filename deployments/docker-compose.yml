services:
  # Local Kafka — KRaft mode (no Zookeeper), Confluent Platform image
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    ports:
      - "9094:9094"   # host-facing port (KAFKA_BROKERS=localhost:9094)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_started   # don't wait for healthy — UI retries on its own

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=eventmind
      - POSTGRES_PASSWORD=eventmind
      - POSTGRES_DB=eventmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: eventmind-api:latest
    ports:
      - "8080:8080"
      - "9091:9091"
    environment:
      PORT: "8080"
      ENV: development
      LOG_LEVEL: debug
      METRICS_PORT: "9091"
      LLM_PROVIDER: groq
      LLM_API_KEY: ${LLM_API_KEY}
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: eventmind-consumer
      KAFKA_TOPIC_EVENTS: events
      KAFKA_TOPIC_DLQ: events.dlq
      KAFKA_USE_TLS: "false"
      DATABASE_URL: postgres://eventmind:eventmind@postgres:5432/eventmind?sslmode=disable
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: eventmind
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  worker:
    image: eventmind-worker:latest
    environment:
      LOG_LEVEL: debug
      LLM_PROVIDER: groq
      LLM_API_KEY: ${LLM_API_KEY}
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: eventmind-consumer
      KAFKA_TOPIC_EVENTS: events
      KAFKA_TOPIC_DLQ: events.dlq
      KAFKA_USE_TLS: "false"
      DATABASE_URL: postgres://eventmind:eventmind@postgres:5432/eventmind?sslmode=disable
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: eventmind
      REDIS_URL: redis://redis:6379
      RETRY_MAX_ATTEMPTS: "5"
      RETRY_BASE_DELAY_MS: "1000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      # dashboard provisioning: mount the whole grafana/dashboards dir so the
      # provisioning YAML and JSON files are co-located at the same path
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/dashboard-provisioning.yml:/etc/grafana/provisioning/dashboards/provisioning.yml:ro
    depends_on:
      - prometheus

volumes:
  kafka_data:
  postgres_data:
  mongo_data:
  redis_data:
  prometheus_data:
  grafana_data:
