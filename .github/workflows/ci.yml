name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eventmind
          POSTGRES_PASSWORD: eventmind
          POSTGRES_DB: eventmind
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install librdkafka
        run: |
          sudo apt-get update
          sudo apt-get install -y librdkafka-dev

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./... -v -short -count=1 -race

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://eventmind:eventmind@localhost:5432/eventmind?sslmode=disable
          MONGODB_URI: mongodb://localhost:27017
          REDIS_URL: redis://localhost:6379
          LLM_PROVIDER: mock
          LLM_API_KEY: mock-key
          KAFKA_BROKERS: ""
        run: go test ./... -v -run Integration -count=1 -timeout 120s

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install librdkafka
        run: sudo apt-get update && sudo apt-get install -y librdkafka-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --build-arg BINARY=api \
            -t $ECR_REGISTRY/eventmind/api:$IMAGE_TAG \
            -t $ECR_REGISTRY/eventmind/api:latest .
          docker push $ECR_REGISTRY/eventmind/api:$IMAGE_TAG
          docker push $ECR_REGISTRY/eventmind/api:latest

      - name: Build and push Worker
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --build-arg BINARY=worker \
            -t $ECR_REGISTRY/eventmind/worker:$IMAGE_TAG \
            -t $ECR_REGISTRY/eventmind/worker:latest .
          docker push $ECR_REGISTRY/eventmind/worker:$IMAGE_TAG
          docker push $ECR_REGISTRY/eventmind/worker:latest

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws eks update-kubeconfig --name eventmind-prod --region us-east-1
          kubectl create namespace eventmind --dry-run=client -o yaml | kubectl apply -f -
          sed -i "s|<ECR_API_URL>|$ECR_REGISTRY/eventmind/api:$IMAGE_TAG|g" deployments/k8s/api-deployment.yaml
          sed -i "s|<ECR_WORKER_URL>|$ECR_REGISTRY/eventmind/worker:$IMAGE_TAG|g" deployments/k8s/worker-deployment.yaml
          kubectl apply -f deployments/k8s/configmap.yaml
          kubectl apply -f deployments/k8s/api-deployment.yaml
          kubectl apply -f deployments/k8s/worker-deployment.yaml
          kubectl apply -f deployments/k8s/ingress.yaml
          kubectl rollout status deployment/eventmind-api -n eventmind --timeout=300s
          kubectl rollout status deployment/eventmind-worker -n eventmind --timeout=300s
